<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chandan Cycle Store — Coming Soon</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
    overflow: hidden;
  }

  .container {
    max-width: 700px;
    animation: fadeIn 1.5s ease;
  }

  .logo {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 15px;
  }

  .logo span {
    color: #00e5ff;
  }

  h1 {
    font-size: 48px;
    margin-bottom: 20px;
    font-weight: 700;
  }

  p {
    font-size: 18px;
    opacity: 0.9;
    line-height: 1.6;
    margin-bottom: 35px;
  }

  .divider {
    width: 80px;
    height: 4px;
    background: #00e5ff;
    margin: 25px auto;
    border-radius: 2px;
  }

  .btn {
    display: inline-block;
    padding: 14px 28px;
    border-radius: 30px;
    background: #00e5ff;
    color: #00323a;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s;
  }

  .btn:hover {
    background: #00bcd4;
    transform: translateY(-2px);
  }

  .footer {
    margin-top: 50px;
    font-size: 14px;
    opacity: 0.7;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>
  <div class="container">
    <div class="logo">Chandan <span>Cycle Store</span></div>
    <div class="divider"></div>
    <h1>We’re Coming Soon</h1>
    <p>
      Our website is under construction.<br>
      We’re preparing something amazing for all cycling lovers.<br>
      Stay tuned!
    </p>
    <a href="#" class="btn">Contact Us</a>
    <div class="footer">
      © 2026 Chandan Cycle Store. All Rights Reserved.
    </div>
  </div>
</body>
</html>
